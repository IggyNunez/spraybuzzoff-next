<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="abdomenGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#444" />
      <stop offset="100%" stop-color="#111" />
    </radialGradient>
    <filter id="shadowMosquito">
      <feDropShadow dx="0" dy="8" stdDeviation="5" flood-color="#000" flood-opacity="0.4" />
    </filter>
  </defs>
  <style>
    .hover { animation: drone 3s ease-in-out infinite; }
    .wing-l { animation: flapL 0.05s linear infinite alternate; transform-origin: 55px 45px; }
    .wing-r { animation: flapR 0.05s linear infinite alternate; transform-origin: 65px 45px; }
    .blood-pulse { animation: feed 3s ease-in-out infinite; }

    @keyframes drone { 0%, 100% { transform: translateY(-3px) translateX(1px); } 50% { transform: translateY(3px) translateX(-1px); } }
    @keyframes flapL { 0% { transform: rotate(-20deg); } 100% { transform: rotate(20deg); } }
    @keyframes flapR { 0% { transform: rotate(20deg); } 100% { transform: rotate(-20deg); } }
    @keyframes feed { 0%, 100% { fill: url(#abdomenGrad); } 50% { fill: #4a1515; } }
  </style>

    <path d="M55 40 Q30 20 20 15 M65 40 Q90 20 100 15" fill="none" stroke="#222" stroke-width="2" stroke-linecap="round"/>

    <line x1="60" y1="35" x2="60" y2="5" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    <circle cx="60" cy="35" r="5" fill="#222" />

    <ellipse cx="60" cy="48" rx="7" ry="10" fill="#333" />

    <ellipse class="blood-pulse" cx="60" cy="72" rx="6" ry="18" />

    <ellipse class="wing-r" cx="78" cy="55" rx="8" ry="25" transform="rotate(-45 78 55)" fill="rgba(200, 220, 255, 0.4)" stroke="#fff" stroke-width="1"/>
  </g>
</svg>
